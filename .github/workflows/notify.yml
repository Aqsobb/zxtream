name: Notify on Failure

on:
  workflow_run:
    workflows: ["Build Z.XTREAM APK"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    permissions:
      issues: write
    steps:
      - name: Create Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Build Failed: ${context.payload.workflow_run.name}`,
              body: `## Build Failed\n\n` +
                    `**Workflow:** ${context.payload.workflow_run.name}\n` +
                    `**Branch:** ${context.payload.workflow_run.head_branch}\n` +
                    `**Commit:** \`${context.payload.workflow_run.head_sha}\`\n\n` +
                    `### [Check Build Logs](${context.payload.workflow_run.html_url})\n\n` +
                    `_Auto-created by CI notification workflow_`,
              labels: ['bug']
            });
            console.log('Issue created for failed build');
