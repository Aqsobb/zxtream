name: Test Scraper Access

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test fetch anichin.moe
        run: |
          STATUS=$(curl -s -o /tmp/anichin.html -w "%{http_code}" "https://anichin.moe" \
            -H "User-Agent: Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/116.0.0.0 Mobile Safari/537.36")
          echo "Status: $STATUS"
          SIZE=$(wc -c < /tmp/anichin.html)
          echo "Size: $SIZE bytes"
          HAS_BS=$(grep -c 'class="bs"' /tmp/anichin.html || true)
          echo "Has .bs class: $HAS_BS"
          if [ "$STATUS" = "200" ] && [ "$HAS_BS" -gt 0 ]; then
            echo "RESULT=OK"
          else
            echo "RESULT=BLOCKED"
            head -c 500 /tmp/anichin.html
          fi
