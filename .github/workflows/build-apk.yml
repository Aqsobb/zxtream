name: Build Z.XTREAM APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      frontend_url:
        description: 'Frontend URL'
        required: false
        default: 'https://zxtream-gf9925289-6749s-projects.vercel.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clone website-to-apk
        run: git clone --depth 1 https://github.com/Jipok/website-to-apk.git /tmp/web2apk

      - name: Get repo ID
        id: repo
        run: echo "id=$(curl -s https://api.github.com/repos/${{ github.repository }} | python3 -c 'import sys,json;print(json.load(sys.stdin).get(\"id\",\"\"))')" >> $GITHUB_OUTPUT

      - name: Create config
        run: |
          FRONTEND_URL="${{ github.event.inputs.frontend_url || 'https://zxtream-gf9925289-6749s-projects.vercel.app' }}"
          cat > /tmp/web2apk/webapk.conf << EOF
          id = zxtream
          name = Z.XTREAM
          mainURL = ${FRONTEND_URL}
          icon =
          allowSubdomains = true
          requireDoubleBackToExit = true
          enableExternalLinks = true
          openExternalLinksInBrowser = true
          confirmOpenInBrowser = true
          allowOpenMobileApp = false
          confirmOpenExternalApp = true
          blockLocalhostRequests = false
          JSEnabled = true
          JSCanOpenWindowsAutomatically = true
          DomStorageEnabled = true
          DatabaseEnabled = true
          MediaPlaybackRequiresUserGesture = false
          SavePassword = true
          edgeToEdge = true
          forceDarkTheme = true
          allowMixedContent = true
          cacheMode = default
          fadeInDuration = 400
          DebugWebView = false
          EOF

      - name: Generate signing key
        working-directory: /tmp/web2apk
        run: |
          keytool -genkey -v -keystore app/my-release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias my -storepass '123456' -keypass '123456' \
            -dname "CN=Z.XTREAM, OU=Dev, O=Z.XTREAM, L=ID, S=ID, C=ID"

      - name: Download Android SDK
        working-directory: /tmp/web2apk
        run: |
          mkdir -p cmdline-tools
          cd /tmp
          wget -q 'https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip' -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d /tmp/web2apk/cmdline-tools
          mv /tmp/web2apk/cmdline-tools/cmdline-tools /tmp/web2apk/cmdline-tools/latest

          export ANDROID_HOME=/tmp/web2apk/cmdline-tools
          yes | $ANDROID_HOME/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            'platform-tools' 'platforms;android-33' 'build-tools;33.0.2' 2>/dev/null || true

      - name: Build APK
        working-directory: /tmp/web2apk
        run: |
          export ANDROID_HOME=/tmp/web2apk/cmdline-tools
          bash make.sh build webapk.conf

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z.XTREAM
          path: /tmp/web2apk/zxtream.apk
          if-no-files-found: error
