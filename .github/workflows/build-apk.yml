name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      frontend_url:
        description: 'Frontend URL for the APK'
        required: true
        default: 'https://your-app.vercel.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create web placeholder
        run: |
          mkdir -p out
          cat > out/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Z.XTREAM</title></head>
          <body style="background:#08080a;margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh">
            <p style="color:#c084fc">Loading...</p>
          </body>
          </html>
          EOF

      - name: Init Capacitor
        run: npx cap add android 2>/dev/null || true

      - name: Configure Capacitor
        run: |
          FRONTEND_URL="${{ github.event.inputs.frontend_url || 'https://your-app.vercel.app' }}"
          cat > capacitor.config.ts << EOF
          import type { CapacitorConfig } from '@capacitor/cli';
          const config: CapacitorConfig = {
            appId: 'com.animestream.app',
            appName: 'Z.XTREAM',
            webDir: 'out',
            server: {
              androidScheme: 'https',
              url: '${FRONTEND_URL}',
              cleartext: true,
              allowNavigation: ['*'],
            },
            plugins: {
              SplashScreen: {
                launchShowDuration: 2000,
                backgroundColor: '#08080a',
                showSpinner: false,
              },
              StatusBar: {
                style: 'DARK',
                backgroundColor: '#08080a',
              },
            },
          };
          export default config;
          EOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z.XTREAM-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
