name: Build Z.XTREAM APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      frontend_url:
        description: 'Frontend URL'
        required: false
        default: 'https://zxtream-gf9925289-6749s-projects.vercel.app'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Clone website-to-apk
        run: git clone --depth 1 https://github.com/Jipok/website-to-apk.git /tmp/web2apk

      - name: Create config
        run: |
          FRONTEND_URL="${{ github.event.inputs.frontend_url || 'https://zxtream-gf9925289-6749s-projects.vercel.app' }}"
          cat > /tmp/web2apk/webapk.conf << EOF
          id = zxtream
          name = Z.XTREAM
          mainURL = ${FRONTEND_URL}
          icon =
          allowSubdomains = true
          requireDoubleBackToExit = true
          enableExternalLinks = true
          openExternalLinksInBrowser = true
          confirmOpenInBrowser = true
          allowOpenMobileApp = false
          confirmOpenExternalApp = true
          blockLocalhostRequests = false
          JSEnabled = true
          JSCanOpenWindowsAutomatically = true
          DomStorageEnabled = true
          DatabaseEnabled = true
          MediaPlaybackRequiresUserGesture = false
          SavePassword = true
          edgeToEdge = true
          forceDarkTheme = true
          allowMixedContent = true
          cacheMode = default
          fadeInDuration = 400
          DebugWebView = false
          EOF

      - name: Generate signing key
        working-directory: /tmp/web2apk
        run: |
          keytool -genkey -v -keystore app/my-release-key.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias my -storepass '123456' -keypass '123456' \
            -dname "CN=Z.XTREAM, OU=Dev, O=Z.XTREAM, L=ID, S=ID, C=ID"

      - name: Install SDK platform
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME \
            'platforms;android-33' 'build-tools;33.0.2' 2>/dev/null || true
          ls $ANDROID_HOME/platforms/

      - name: Build APK
        working-directory: /tmp/web2apk
        run: |
          # Point config to use GitHub's pre-installed SDK
          mkdir -p app/src/main/java/com/zxtream
          rm -rf app/src/main/java/com/zxtream/webtoapk 2>/dev/null || true

          # Set ANDROID_HOME for Gradle
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk

          # Create local.properties for Gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          bash make.sh build webapk.conf

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z.XTREAM
          path: /tmp/web2apk/zxtream.apk
          if-no-files-found: error
